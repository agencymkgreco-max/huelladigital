<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Firma de Contrato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0f0e0c;
      --paper: #f7f4ee;
      --paper-dark: #ede9df;
      --gold: #b8943f;
      --gold-light: #d4a853;
      --red: #c0392b;
      --success: #27635a;
      --border: #c8bfa8;
      --shadow: rgba(15,14,12,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(184,148,63,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(184,148,63,0.06) 0%, transparent 60%);
    }
    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    header::before {
      content: '';
      display: block;
      width: 48px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 20px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    header p {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #7a7265;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    /* Resto de estilos sin cambios */
    main { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }
    .step { display: none; animation: fadeUp 0.4s ease both; }
    .step.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    /* ... (todos tus estilos originales se mantienen) */
  </style>
</head>
<body>

<header>
  <h1>Firma de Contrato</h1>
  <p>Proceso de firma digital segura</p>
</header>

<main>
  <!-- STEP INDICATOR -->
  <div class="steps-indicator">
    <div class="step-dot active" id="dot-1">1</div>
    <div class="step-line"></div>
    <div class="step-dot" id="dot-2">2</div>
    <div class="step-line"></div>
    <div class="step-dot" id="dot-3">3</div>
  </div>

  <!-- STEP 1 -->
  <div class="step active" id="step-1">
    <div class="section-label">Paso 1 de 3</div>
    <div class="section-title">Identificación</div>
    <p class="section-desc">Ingresa tu nombre completo tal como aparece en tu identificación oficial.</p>
    <div class="field">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Ej. María García López" autocomplete="name" />
    </div>
    <div class="field">
      <label>Correo electrónico (opcional)</label>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" />
    </div>
    <button class="btn btn-primary" id="btn-step1">Continuar al contrato</button>
  </div>

  <!-- Los demás pasos (2, 3 y success) se mantienen iguales. Copia el resto de tu código original aquí -->
  <!-- ... (pega aquí todo el contenido que tenías de los steps 2, 3 y success) ... -->

</main>

<div id="toast"></div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
</body>
</html>
