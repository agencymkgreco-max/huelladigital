<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Smitt-Dent</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f8f5f0; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 30px; }
    .login { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
    button { width: 100%; padding: 14px; background: #27635a; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1f5048; }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    .firma-img { max-width: 150px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">

    <!-- LOGIN -->
    <div id="login-screen">
      <div class="login">
        <h2>🔐 Acceso Administrativo</h2>
        <p>Smitt-Dent</p>
        
        <input type="text" id="admin-user" placeholder="Usuario" value="admin">
        <input type="password" id="admin-pass" placeholder="Contraseña" value="smittdent2025">
        
        <button onclick="loginAdmin()">Ingresar</button>
        
      </div>
    </div>

    <!-- PANEL ADMIN -->
    <div id="admin-panel" class="hidden">
      <header>
        <h1>Panel Administrativo - Smitt-Dent</h1>
        <button onclick="logout()">Cerrar Sesión</button>
      </header>

      <div style="display:flex; gap:20px; margin:20px 0;">
        <div><strong>Total firmas:</strong> <span id="total-firmas">0</span></div>
        <div><strong>Con biométrico:</strong> <span id="biometricos">0</span></div>
        <div><strong>Hoy:</strong> <span id="hoy">0</span></div>
      </div>

      <button onclick="cargarFirmas()">Actualizar Lista</button>
      <button onclick="exportarCSV()">Exportar CSV</button>

      <table id="tabla-firmas">
        <thead>
          <tr>
            <th>Folio</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Fecha</th>
            <th>Biométrico</th>
            <th>Firma</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const db = createClient(
      "https://lrqtpzktrmyohkltugzo.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxycXRwemt0cm15b2hrbHR1Z3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzc5OTUsImV4cCI6MjA5NDgxMzk5NX0.pZpobZNUQvMYwlRAliDIJneJeCdJ5b3JySz1nUb6Jh8"
    );

    let isLoggedIn = false;

    function loginAdmin() {
      const user = document.getElementById('admin-user').value;
      const pass = document.getElementById('admin-pass').value;

      if (user === "admin" && pass === "smittdent2025") {
        isLoggedIn = true;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        cargarFirmas();
      } else {
        alert("Usuario o contraseña incorrectos");
      }
    }

    async function cargarFirmas() {
      const { data, error } = await db
        .from('firmas')
        .select('*')
        .order('fecha_firma', { ascending: false });

      if (error) {
        alert("Error al cargar firmas: " + error.message);
        return;
      }

      const tbody = document.querySelector('#tabla-firmas tbody');
      tbody.innerHTML = '';

      data.forEach(f => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${f.folio}</td>
          <td>${f.nombre}</td>
          <td>${f.email || '-'}</td>
          <td>${new Date(f.fecha_firma).toLocaleString('es-MX')}</td>
          <td>${f.biometrico_verificado ? '✅ Sí' : '❌ No'}</td>
          <td><img src="${f.firma_url}" class="firma-img" onclick="verFirma('${f.firma_url}')"></td>
        `;
        tbody.appendChild(row);
      });

      // Actualizar contadores
      document.getElementById('total-firmas').textContent = data.length;
    }

    function verFirma(url) {
      window.open(url, '_blank');
    }

    function exportarCSV() {
      alert("Funcionalidad de exportar CSV en desarrollo...");
      // Podemos implementarla después si quieres
    }

    function logout() {
      document.getElementById('admin-panel').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      isLoggedIn = false;
    }

    // Permitir Enter en el login
    document.getElementById('admin-pass').addEventListener('keypress', e => {
      if (e.key === 'Enter') loginAdmin();
    });
  </script>
</body>
</html>
